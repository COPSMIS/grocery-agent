services:
  - type: web
    name: grocery-price-agent
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # You set this manually in Render dashboard
      - key: PINCODE
        value: "110001"   # Change to your pincode
